<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Mac OS</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Chicago', 'Geneva', 'Arial', sans-serif;
            background: #c3c3c3;
        }

        .desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(#c3c3c3, #bdbdbd);
        }

        /* Menu bar (System 7 style) */
        .menu-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 22px;
            background: #e6e6e6;
            border-bottom: 1px solid #9b9b9b;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px;
            user-select: none;
            -webkit-user-select: none;
            z-index: 1000;
        }

        .menu-title {
            font-weight: 600;
            color: #000;
            letter-spacing: 0.2px;
        }

        .menu-item {
            color: #000;
            padding: 2px 6px;
            border-radius: 2px;
            cursor: default;
        }

        .menu-item:hover {
            background: #000;
            color: #fff;
        }

        /* Window */
        .window {
            position: absolute;
            top: 80px;
            left: 80px;
            width: 420px;
            background: #e6e6e6;
            border: 1px solid #000;
            box-shadow: 2px 2px 0 #000;
            /* subtle inner chrome bevel */
            outline: 1px solid #9b9b9b;
            outline-offset: -2px;
        }

        .title-bar {
            height: 18px;
            background: #bdbdbd;
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            cursor: move;
            user-select: none;
            -webkit-user-select: none;
        }

        .title-text {
            font-size: 12px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            width: 10px;
            height: 10px;
            border: 1px solid #000;
            background: #e6e6e6;
            cursor: pointer;
        }

        .content {
            padding: 10px;
            background: #fff;
            min-height: 140px;
            border-top: 1px solid #9b9b9b;
        }

        .status-bar {
            height: 16px;
            background: #e6e6e6;
            border-top: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            font-size: 11px;
        }

        .dock {
            position: absolute;
            bottom: 14px;
            left: 14px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }

        .icon {
            width: 48px;
            text-align: center;
            color: #000;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        .icon img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            border: 1px solid #000;
            background: #fff;
        }

        .icon-label {
            font-size: 12px;
            margin-top: 4px;
        }

        /* Retro Theme Tokens */
        :root {
            --ink:#0B0B0B; --paper:#FFFFFF; --panel:#E6E6E6; --chrome:#BDBDBD; --shadow:#9B9B9B;
            --blue:#3B6EA8; --aqua:#5DA7FF; --beige:#E7E1D5;
        }

        /* Generic retro controls inside app content */
        .content button {
            border: 1px solid var(--ink);
            background: #fff;
            padding: 4px 8px;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--ink);
            margin: 2px 2px;
        }
        .content button:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--ink); }
        .content input[type="text"],
        .content input[type="number"],
        .content input[type="range"],
        .content input[type="file"],
        .content select,
        .content textarea {
            border: 1px solid var(--ink);
            background: #fff;
            box-sizing: border-box;
        }
        .content input[type="text"],
        .content input[type="number"],
        .content select,
        .content textarea { padding: 4px 6px; }
        .content textarea { line-height: 1.4; }
        .content label { display: inline-flex; align-items: center; gap: 8px; }
        /* Tables/lists */
        .content select[size] { background: #fff; }
    </style>
</head>
<body>
    <div class="desktop" id="desktop">
        <div class="menu-bar">
            <div class="menu-title"> Retro Mac</div>
            <div class="menu-item" data-action="about">About This Mac…</div>

            </div>
            <div class="icon" data-app="ipod">
